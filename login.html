<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | CareerNest</title>
    <meta name="description" content="Sign in to your CareerNest account and continue your job search journey.">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">
            <span class="auth-logo">CareerNest</span>
            <h2>Welcome back 👋</h2>
            <p class="subtitle">Sign in to track your applications and discover new jobs.</p>

            <button class="social-btn">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                        fill="#4285F4" />
                    <path
                        d="M9 18c2.43 0 4.467-.806 5.956-2.185l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
                        fill="#34A853" />
                    <path
                        d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A9.009 9.009 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"
                        fill="#FBBC05" />
                    <path
                        d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z"
                        fill="#EA4335" />
                </svg>
                Continue with Google
            </button>

            <div class="auth-divider">or sign in with email</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox" style="accent-color: var(--primary)"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="auth-full-btn">Sign In →</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="#">Create one free</a>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">✅</span>
        <span id="toastMsg">Signed in successfully!</span>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return;
            showToast('✅', 'Welcome back! Redirecting...');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1800);
        }

        function showToast(icon, msg) {
            const toast = document.getElementById('toast');
            document.querySelector('.toast-icon').textContent = icon;
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }
    </script>

</body>

</html>
